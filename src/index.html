<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JMS Universal Video Downloader</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="header-bar" data-tauri-drag-region>
      <div data-tauri-drag-region style="display: flex; align-items: center; justify-content: center; background: transparent; border: 2px solid #3a7bd5; box-sizing: border-box; border-radius: 50%; width: 28px; height: 28px; font-size: 10px; font-weight: 800; color: #3a7bd5; margin-left: 8px; box-shadow: 0 2px 8px rgba(58, 123, 213, 0.4); user-select: none; cursor: default;">JMS</div>
      <div class="drag-region" data-tauri-drag-region></div>
      <button id="pin-btn" class="titlebar-btn" type="button" title="Toggle Always on Top">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"></line>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 11.2V6a3 3 0 0 0-6 0v5.2a2 2 0 0 1-1.11 1.35l-1.78.9A2 2 0 0 0 5 15.24Z"></path>
        </svg>
      </button>
      <button id="new-instance-btn" class="titlebar-btn" type="button" title="Open New Instance (Shift+Click anywhere)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="minimize-btn" class="titlebar-btn" type="button" title="Minimize">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="close-btn" class="titlebar-btn" type="button" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <main class="container">
      <h1>
        Video Downloader
      </h1>

      <div class="row">
        <p>Paste a video link below to start the download.</p>
      </div>

      <div class="row">
        <input id="url-input" placeholder="Paste video link here..." />
        <button id="reset-btn" type="button" title="Reset URL">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <input id="path-display" type="text" readonly placeholder="Select download location..." />
        <button id="folder-btn" type="button" title="Select Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <select id="quality-select" title="Select Video Quality">
          <option value="best">Best Quality (Default)</option>
          <option value="1080p">Up to 1080p</option>
          <option value="720p">Up to 720p</option>
          <option value="audio">Audio Only (MP3)</option>
        </select>
      </div>

    <div class="row" style="flex-direction: column; gap: 4px;">
      <select id="cookie-select" title="Pass browser cookies to bypass login walls on Facebook & Instagram">
        <option value="none">No Cookies (Default)</option>
        <option value="chrome">Use Chrome Cookies (Bypass FB/IG Blocks)</option>
        <option value="edge">Use Edge Cookies (Bypass FB/IG Blocks)</option>
        <option value="firefox">Use Firefox Cookies (Bypass FB/IG Blocks)</option>
        <option value="file">Use cookies.txt File (Most Reliable for FB/IG)</option>
      </select>
      <div id="cookie-warning" style="display: none; font-size: 0.75rem; color: #ffab00; text-align: left; padding-left: 4px; margin-top: -4px;">
        ⚠️ You must completely close the browser, or use Firefox/cookies.txt instead.
      </div>
      <div id="cookie-file-container" style="display: none; align-items: center; gap: 8px; margin-top: 4px;">
        <input id="cookie-file-display" type="text" readonly placeholder="Select cookies.txt file..." style="font-size: 0.8em; padding: 0.6em; background-color: #222;" />
        <button id="cookie-file-btn" type="button" title="Browse for cookies.txt" style="padding: 0.6em; min-width: 40px; display: flex; align-items: center; justify-content: center; background-color: #2a2a2a;">📁</button>
      </div>
    </div>

      <div class="row">
        <button id="download-btn" type="button">Download Video</button>
      </div>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div class="status-container">
        <p id="status-msg">Waiting for input...</p>
        <span id="progress-text">0%</span>
        <button id="open-folder-btn" type="button" title="Open Download Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>

    </main>

    <!-- Utility tool to update yt-dlp, positioned at the bottom-left corner -->
    <div style="position: fixed; bottom: 10px; left: 10px; z-index: 10;">
      <button id="update-btn" type="button" title="Update Download Engine" style="background-color: transparent; border: none; color: #3a7bd5; font-size: 0.8em; padding: 0.5em 1em; cursor: pointer;">
        🔄 Update Engine
      </button>
    </div>
  </body>
</html>
