<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JMS YouTube Downloader</title>
    <!-- We keep the script reference exactly as it was -->
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>JMS YouTube Downloader</h1>

      <div class="row">
        <p>Paste a YouTube link below to start the download.</p>
      </div>

      <!-- We changed the IDs here to match our new logic -->
      <div class="row">
        <input id="url-input" placeholder="Paste link here..." />
        <button id="folder-btn" type="button" style="background-color: #444; min-width: 50px;">📁</button>
        <button id="download-btn" type="button">Download</button>
      </div>
<p id="status-msg">No folder selected</p>
    </main>
  </body>
</html>
