<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JMS YouTube Downloader</title>
    <!-- We keep the script reference exactly as it was -->
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>JMS YouTube Downloader</h1>

      <div class="row">
        <p>Paste a YouTube link below to start the download.</p>
      </div>

      <div class="row">
        <input id="url-input" placeholder="Paste YouTube link here..." />
        <button id="reset-btn" type="button" title="Reset URL">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <input id="path-display" type="text" readonly placeholder="Select download location..." />
        <button id="folder-btn" type="button" title="Select Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <button id="download-btn" type="button">Download Video</button>
      </div>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div class="status-container">
        <p id="status-msg">Waiting for input...</p>
        <span id="progress-text">0%</span>
        <button id="open-folder-btn" type="button" title="Open Download Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>
    </main>
  </body>
</html>
