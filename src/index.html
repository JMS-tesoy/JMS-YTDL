<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JMS Universal Video Downloader</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="header-bar" data-tauri-drag-region>
      <div data-tauri-drag-region style="display: flex; align-items: center; justify-content: center; background: transparent; border: 2px solid #3a7bd5; box-sizing: border-box; border-radius: 50%; width: 28px; height: 28px; font-size: 10px; font-weight: 800; color: #3a7bd5; margin-left: 8px; box-shadow: 0 2px 8px rgba(58, 123, 213, 0.4); user-select: none; cursor: default;">JMS</div>
      <div class="drag-region" data-tauri-drag-region></div>
      <button id="pin-btn" class="titlebar-btn" type="button" title="Toggle Always on Top">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"></line>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 11.2V6a3 3 0 0 0-6 0v5.2a2 2 0 0 1-1.11 1.35l-1.78.9A2 2 0 0 0 5 15.24Z"></path>
        </svg>
      </button>
      <button id="new-instance-btn" class="titlebar-btn" type="button" title="Open New Instance (Shift+Click anywhere)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="minimize-btn" class="titlebar-btn" type="button" title="Minimize">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="close-btn" class="titlebar-btn" type="button" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <main class="container">
      <h1>
        Video Downloader
      </h1>

      <div class="row">
        <p>Paste a video link below to start the download.</p>
      </div>

      <div class="row">
        <input id="url-input" placeholder="Paste video link here..." />
        <button id="reset-btn" type="button" title="Reset URL">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <input id="path-display" type="text" readonly placeholder="Select download location..." />
        <button id="folder-btn" type="button" title="Select Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>

      <div class="row">
        <select id="quality-select" title="Select Video Quality">
          <option value="best">Best Quality (Default)</option>
          <option value="1080p">Up to 1080p</option>
          <option value="720p">Up to 720p</option>
          <option value="audio">Audio Only (MP3)</option>
        </select>
      </div>

    <div class="row" style="flex-direction: column; gap: 4px;">
      <select id="cookie-select" title="Pass browser cookies to bypass login walls on Facebook & Instagram">
        <option value="none">No Cookies (Default)</option>
        <option value="chrome">Use Chrome Cookies (Bypass FB/IG Blocks)</option>
        <option value="edge">Use Edge Cookies (Bypass FB/IG Blocks)</option>
        <option value="firefox">Use Firefox Cookies (Bypass FB/IG Blocks)</option>
        <option value="file">Use cookies.txt File (Most Reliable for FB/IG)</option>
      </select>
      <div id="cookie-warning" style="display: none; font-size: 0.75rem; color: #ffab00; text-align: left; padding-left: 4px; margin-top: -4px;">
        ⚠️ You must completely close the browser, or use Firefox/cookies.txt instead.
      </div>
      <div id="cookie-file-container" style="display: none; align-items: center; gap: 8px; margin-top: 4px;">
        <input id="cookie-file-display" type="text" readonly placeholder="Select cookies.txt file..." style="font-size: 0.8em; padding: 0.6em; background-color: #222;" />
        <button id="cookie-file-btn" type="button" title="Browse for cookies.txt" style="padding: 0.6em; min-width: 40px; display: flex; align-items: center; justify-content: center; background-color: #2a2a2a;">📁</button>
      </div>
    </div>

      <div class="row">
        <button id="download-btn" type="button">Download Video</button>
      </div>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div class="status-container">
        <p id="status-msg">Waiting for input...</p>
        <span id="progress-text">0%</span>
        <button id="open-folder-btn" type="button" title="Open Download Folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
          </svg>
        </button>
      </div>

      <!-- ──────────────────────────────────── -->
      <!--  TRANSCRIPTION SECTION              -->
      <!-- ──────────────────────────────────── -->
      <div class="section-divider">
        <button id="toggle-transcribe" type="button" class="section-toggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
          <span>Audio & Video Transcriber</span>
          <svg id="toggle-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
      </div>

      <div id="transcribe-section" class="transcribe-panel">
        <!-- Model Selection & Status -->
        <div class="row" style="flex-direction: column; gap: 6px;">
          <div style="display: flex; gap: 8px; align-items: center; width: 100%;">
            <select id="model-size-select" title="Select whisper model size (larger = more accurate)" style="font-size: 0.8em; flex: 1; padding: 0.4em 0.8em;">
              <option value="base">Base (142 MB) - Fast, speech only</option>
              <option value="small" selected>Small (466 MB) - Better, music+speech</option>
              <option value="medium">Medium (1.5 GB) - Best accuracy</option>
            </select>
          </div>
          <div style="display: flex; gap: 8px; align-items: center; width: 100%;">
            <div id="model-status" class="model-status-badge">
              <span id="model-status-text">Checking model...</span>
            </div>
            <button id="download-model-btn" type="button" title="Download whisper model" style="display: none; padding: 0.5em 1em; font-size: 0.85em;">
              ⬇ Download Model
            </button>
          </div>
        </div>

        <!-- Media File Selector (Audio or Video) -->
        <div class="row">
          <input id="media-path-display" type="text" readonly placeholder="Select audio or video file to transcribe..." style="font-size: 0.85em;" />
          <button id="media-file-btn" type="button" title="Select Audio or Video File">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </button>
        </div>

        <!-- Language Selector with Refresh Button -->
        <div class="row">
          <button id="transcribe-reset-btn" type="button" title="Reset All Transcription Fields">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
          <select id="language-select" title="Select transcription language">
            <option value="auto">Auto-detect Language</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
            <option value="id">Indonesian</option>
            <option value="ms">Malay</option>
            <option value="tl">Tagalog</option>
          </select>
          <button id="transcribe-btn" type="button" title="Start Transcription" style="min-width: 50px; display: flex; align-items: center; justify-content: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          </button>
        </div>

        <!-- Transcription Progress -->
        <div id="transcribe-progress-container" class="progress-container" style="margin-top: 0.5rem;">
          <div id="transcribe-progress-bar"></div>
        </div>
        <p id="transcribe-status" style="font-size: 0.8em; color: #a1a1a1; margin: 0.3rem 0; min-height: 1.2em;"></p>

        <!-- Transcription Output -->
        <div id="transcript-output-container" style="display: none; width: 100%; max-width: 500px; margin-top: 0.8rem;">
          <textarea id="transcript-output" readonly placeholder="Transcription will appear here..." style="width: 100%; height: 150px; resize: vertical; font-size: 0.85em; padding: 0.8em; border-radius: 12px; background: #222; color: #f6f6f6; border: 2px solid #333; outline: none; box-sizing: border-box; font-family: inherit;"></textarea>
          <div style="display: flex; gap: 8px; margin-top: 6px;">
            <button id="copy-transcript-btn" type="button" style="flex: 1; font-size: 0.8em; padding: 0.5em;">📋 Copy</button>
            <button id="save-transcript-btn" type="button" style="flex: 1; font-size: 0.8em; padding: 0.5em;">💾 Save as .txt</button>
          </div>
        </div>
      </div>

    </main>

    <!-- Utility tool to update yt-dlp, positioned at the bottom-left corner -->
    <div style="position: fixed; bottom: 10px; left: 10px; z-index: 10;">
      <button id="update-btn" type="button" title="Update Download Engine" style="background-color: transparent; border: none; color: #3a7bd5; font-size: 0.8em; padding: 0.5em 1em; cursor: pointer;">
        🔄 Update Engine
      </button>
    </div>

    <!-- Modern Minimalist Notification Pop-up -->
    <div id="toast-notification"></div>

  </body>
</html>
